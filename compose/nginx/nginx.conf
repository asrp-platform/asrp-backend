server {
    listen 80;
    server_name asrpath.org;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location /.well-known/acme-challenge/ {
        alias /var/www/html/.well-known/acme-challenge/;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://asrp_backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}



server {
    listen 443 ssl http2;
    server_name asrpath.org;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/asrpath.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asrpath.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location /api/ {
        proxy_pass http://asrp_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/directors-board/images {
        client_max_body_size 10M;
        proxy_pass http://asrp_backend:8000/api/directors-board/images;
    }

    location ~ ^/api/users/[^/]+/avatar$ {
        client_max_body_size 10M;
        proxy_pass http://asrp_backend:8000;
    }

    location / {
        proxy_pass http://asrp_frontend:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }


}
