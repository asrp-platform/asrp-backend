services:
  asrp_database:
    container_name: asrp_database
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./compose/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3.13-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  asrp_backend:
    container_name: asrp_backend
    build:
      context: .
      dockerfile: compose/backend/Dockerfile
    depends_on:
      asrp_database:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: asrp_database
      DB_PORT: 5432
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      S3_ENDPOINT: http://minio:9000
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./logs:/app/logs
    networks:
      - internal

  celery_worker:
    container_name: celery_worker
    build:
      context: .
      dockerfile: compose/backend/Dockerfile
    entrypoint: []
    command: celery -A app.core.celery.celery_app worker --loglevel=info -Q emails
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: asrp_database
      DB_PORT: 5432
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      S3_ENDPOINT: http://minio:9000
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    networks:
      - internal

  minio:
    container_name: minio
    image: minio/minio:latest
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    volumes:
      - minio_data:/data
    networks:
      - internal

  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    depends_on:
      - asrp_backend
      - minio
    ports:
      - "80:80"
    volumes:
      - ./compose/nginx/nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - internal

  stripe_cli:
    container_name: stripe_cli
    image: stripe/stripe-cli:latest
    profiles:
      - stripe
    depends_on:
      - asrp_backend
    env_file:
      - .env
    environment:
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_DEVICE_NAME: docker-stripe-cli
    command: listen --forward-to http://asrp_backend:8000/api/payments/stripe/webhook --events checkout.session.completed,checkout.session.expired,checkout.session.async_payment_succeeded,checkout.session.async_payment_failed,payment_intent.succeeded,payment_intent.payment_failed
    restart: unless-stopped
    networks:
      - internal

  redis:
    container_name: redis
    image: redis:7.4
    ports:
      - "6379:6379"
    env_file:
      - .env
    environment:
      - REDIS_USER_PASSWORD=${REDIS_USER_PASSWORD}
      - REDIS_USER=${REDIS_USER}
    command: >
      sh -c '  
        mkdir -p /usr/local/etc/redis &&
        echo "requirepass $REDIS_USER_PASSWORD" >> /usr/local/etc/redis/redis.conf &&  
        echo "appendonly yes" >> /usr/local/etc/redis/redis.conf &&  
        echo "appendfsync everysec" >> /usr/local/etc/redis/redis.conf &&  
      
        # ACL  
        echo "user default off ~* -@all" > /usr/local/etc/redis/users.acl &&  
        echo "user $REDIS_USER on >$REDIS_USER_PASSWORD ~* +@all" >> /usr/local/etc/redis/users.acl &&  
      
        redis-server /usr/local/etc/redis/redis.conf --aclfile /usr/local/etc/redis/users.acl  
      '
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_USER_PASSWORD}", "PING" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:
  minio_data:
  rabbitmq_data:

networks:
  internal:
    driver: bridge
