services:
  asrp_database:
    container_name: asrp_database
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./compose/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  asrp_backend:
    container_name: asrp_backend
    build:
      context: .
      dockerfile: compose/backend/Dockerfile
    depends_on:
      asrp_database:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      DB_HOST: asrp_database
      DB_PORT: 5432
      S3_ENDPOINT: http://minio:9000
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./logs:/app/logs
      - ./media:/app/media
    networks:
      - internal

  minio:
    container_name: minio
    image: minio/minio:latest
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    volumes:
      - minio_data:/data
    networks:
      - internal

  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    depends_on:
      - asrp_backend
      - minio
    ports:
      - "80:80"
    volumes:
      - ./compose/nginx/nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - internal

  stripe_cli:
    container_name: stripe_cli
    image: stripe/stripe-cli:latest
    profiles:
      - stripe
    depends_on:
      - asrp_backend
    env_file:
      - .env
    environment:
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_DEVICE_NAME: docker-stripe-cli
    command: listen --forward-to http://asrp_backend:8000/api/payments/stripe/webhook --events checkout.session.completed,checkout.session.async_payment_succeeded,checkout.session.async_payment_failed,payment_intent.succeeded,payment_intent.payment_failed
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:
  minio_data:

networks:
  internal:
    driver: bridge
