name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip pipx
          pipx install poetry
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          poetry --version

      - name: Install dependencies
        run: poetry install --with dev

      - name: Write CI .env
        shell: bash
        run: |
          cat > .env <<'EOF'
          DB_HOST=localhost
          DB_PORT=5432
          DB_PASSWORD=test
          DB_USER=test
          DB_NAME=test

          DEV_MODE=true

          SECRET_KEY=${{ secrets.SECRET_KEY }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          ALGORITHM=${{ secrets.ALGORITHM }}

          GMAIL_USERNAME=${{ secrets.GMAIL_USERNAME }}
          GMAIL_PASSWORD=${{ secrets.GMAIL_PASSWORD }}
          GMAIL_FROM=${{ secrets.GMAIL_FROM }}
          GMAIL_PORT=${{ secrets.GMAIL_PORT }}
          GMAIL_SERVER=${{ secrets.GMAIL_SERVER }}

          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          S3_REGION=${{ secrets.S3_REGION }}

          STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}

          BACKEND_DOMAIN=http://localhost:8000
          FRONTEND_DOMAIN_HTTP=http://localhost:3000
          FRONTEND_DOMAIN=http://localhost:3000
          EOF

      - name: Lint
        run: poetry run ruff check .

      - name: Validate dev-server compose
        run: docker compose -f docker-compose.dev.yml config

      - name: Validate local compose
        run: docker compose -f local.yml config

  migrations:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip pipx
          pipx install poetry
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          poetry --version

      - name: Install dependencies
        run: poetry install --with dev

      - name: Write CI .env
        shell: bash
        run: |
          cat > .env <<'EOF'
          DB_HOST=localhost
          DB_PORT=5432
          DB_PASSWORD=test
          DB_USER=test
          DB_NAME=test

          DEV_MODE=true

          SECRET_KEY=${{ secrets.SECRET_KEY }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          ALGORITHM=${{ secrets.ALGORITHM }}

          GMAIL_USERNAME=${{ secrets.GMAIL_USERNAME }}
          GMAIL_PASSWORD=${{ secrets.GMAIL_PASSWORD }}
          GMAIL_FROM=${{ secrets.GMAIL_FROM }}
          GMAIL_PORT=${{ secrets.GMAIL_PORT }}
          GMAIL_SERVER=${{ secrets.GMAIL_SERVER }}

          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          S3_REGION=${{ secrets.S3_REGION }}

          STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}

          BACKEND_DOMAIN=http://localhost:8000
          FRONTEND_DOMAIN_HTTP=http://localhost:3000
          FRONTEND_DOMAIN=http://localhost:3000
          EOF

      - name: Build backend image
        run: docker compose -f docker-compose.dev.yml build asrp_backend

      - name: Start dev-server migration services
        run: docker compose -f docker-compose.dev.yml up -d asrp_database minio

      - name: Wait for Postgres
        shell: bash
        run: |
          for i in {1..12}; do
            if docker compose -f docker-compose.dev.yml exec -T asrp_database pg_isready -U test -d test; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/12)"
            sleep 5
          done
          docker compose -f docker-compose.dev.yml logs asrp_database || true
          exit 1

      - name: Apply migrations
        run: poetry run alembic upgrade head

      - name: Dump dev-server service logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color || true

      - name: Stop dev-server migration services
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip pipx
          pipx install poetry
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          poetry --version

      - name: Install dependencies
        run: poetry install --with dev

      - name: Write CI .env
        shell: bash
        run: |
          cat > .env <<'EOF'
          DB_HOST=localhost
          DB_PORT=5432
          DB_PASSWORD=test
          DB_USER=test
          DB_NAME=test

          DEV_MODE=true

          SECRET_KEY=${{ secrets.SECRET_KEY }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          ALGORITHM=${{ secrets.ALGORITHM }}

          GMAIL_USERNAME=${{ secrets.GMAIL_USERNAME }}
          GMAIL_PASSWORD=${{ secrets.GMAIL_PASSWORD }}
          GMAIL_FROM=${{ secrets.GMAIL_FROM }}
          GMAIL_PORT=${{ secrets.GMAIL_PORT }}
          GMAIL_SERVER=${{ secrets.GMAIL_SERVER }}

          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          S3_REGION=${{ secrets.S3_REGION }}

          STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}

          BACKEND_DOMAIN=http://localhost:8000
          FRONTEND_DOMAIN_HTTP=http://localhost:3000
          FRONTEND_DOMAIN=http://localhost:3000
          EOF

      - name: Start dev-server test services
        run: docker compose -f docker-compose.dev.yml up -d asrp_database minio

      - name: Wait for Postgres
        shell: bash
        run: |
          for i in {1..12}; do
            if docker compose -f docker-compose.dev.yml exec -T asrp_database pg_isready -U test -d test; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/12)"
            sleep 5
          done
          docker compose -f docker-compose.dev.yml logs asrp_database || true
          exit 1

      - name: Apply migrations
        run: poetry run alembic upgrade head

      - name: Run tests
        run: poetry run pytest

      - name: Dump dev-server service logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --no-color || true

      - name: Stop dev-server test services
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  check_local:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip pipx
          pipx install poetry
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          poetry --version

      - name: Install dependencies
        run: poetry install --with dev

      - name: Write local CI .env
        shell: bash
        run: |
          cat > .env <<'EOF'
          DB_HOST=localhost
          DB_PORT=5432
          DB_PASSWORD=test
          DB_USER=test
          DB_NAME=test

          DEV_MODE=true

          SECRET_KEY=${{ secrets.SECRET_KEY }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          ALGORITHM=${{ secrets.ALGORITHM }}

          GMAIL_USERNAME=${{ secrets.GMAIL_USERNAME }}
          GMAIL_PASSWORD=${{ secrets.GMAIL_PASSWORD }}
          GMAIL_FROM=${{ secrets.GMAIL_FROM }}
          GMAIL_PORT=${{ secrets.GMAIL_PORT }}
          GMAIL_SERVER=${{ secrets.GMAIL_SERVER }}

          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          S3_REGION=${{ secrets.S3_REGION }}

          STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}

          BACKEND_DOMAIN=http://localhost:8000
          FRONTEND_DOMAIN_HTTP=http://localhost:3000
          FRONTEND_DOMAIN=http://localhost:3000
          EOF

      - name: Start local-dev services
        run: docker compose -f local.yml up -d asrp_database minio

      - name: Wait for Postgres
        shell: bash
        run: |
          for i in {1..12}; do
            if docker compose -f local.yml exec -T asrp_database pg_isready -U test -d test; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/12)"
            sleep 5
          done
          docker compose -f local.yml logs asrp_database || true
          exit 1

      - name: Apply migrations against local stack
        run: poetry run alembic upgrade head

      - name: Dump local service logs on failure
        if: failure()
        run: docker compose -f local.yml logs --no-color || true

      - name: Stop local-dev services
        if: always()
        run: docker compose -f local.yml down -v

  deploy_dev:
    needs:
      - lint
      - migrations
      - tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            cd ~/asrp-backend

            git fetch origin
            git checkout develop
            git pull --ff-only origin develop

            docker compose -f docker-compose.dev.yml up -d --build
