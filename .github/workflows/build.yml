name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches: ["*"]

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Poetry
        run: |
          python3 -m pip install --upgrade pip pipx
          pipx ensurepath
          pipx install poetry
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          poetry --version

      - name: Install deps
        run: poetry install --with dev

      - name: Lint (ruff)
        run: poetry run ruff check .

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        shell: bash
        run: |
          cat > .env <<'EOF'
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          ALGORITHM=${{ secrets.ALGORITHM }}


          BACKEND_DOMAIN=asrp_backend
          BACKEND_PORT=8000

          FRONTEND_DOMAIN=http://localhost:3000
          FRONTEND_DOMAIN_HTTP=http://localhost:3000

          GMAIL_USERNAME=${{ secrets.GMAIL_USERNAME }}
          GMAIL_PASSWORD=${{ secrets.GMAIL_PASSWORD }}
          GMAIL_FROM=${{ secrets.GMAIL_FROM }}
          GMAIL_PORT=${{ secrets.GMAIL_PORT }}
          GMAIL_SERVER=${{ secrets.GMAIL_SERVER }}

          DB_PORT=5432
          DB_PASSWORD=test
          DB_USER=test
          DB_NAME=test
          DB_HOST=localhost

          STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}

          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          S3_REGION=${{ secrets.S3_REGION }}

          S3_ENDPOINT=http://minio:9000
          S3_PUBLIC_URL=http://minio:9000

          EOF

          echo ".env written (secrets hidden)"

      - name: Start DB with docker compose
        run: |
          docker compose -f local.yml up -d asrp_database
          docker compose -f local.yml ps
          docker compose -f local.yml logs --no-color --tail=50 asrp_database || true

      - name: Wait for Postgres
        shell: bash
        run: |
          for i in {1..12}; do
            if docker compose -f local.yml exec -T asrp_database pg_isready -U test; then
              echo "PostgreSQL is ready"; exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/12)"
            sleep 5
          done
          echo "PostgreSQL failed to start"
          docker compose -f local.yml logs asrp_database || true
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Poetry & deps
        run: |
          python3 -m pip install --upgrade pip pipx
          pipx ensurepath
          pipx install poetry
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          poetry install --with dev

      - name: Run Alembic migrations
        run: poetry run alembic upgrade head

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        shell: bash
        run: |
          cat > .env <<'EOF'
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          ALGORITHM=${{ secrets.ALGORITHM }}

          BACKEND_DOMAIN=asrp_backend
          BACKEND_PORT=8000

          FRONTEND_DOMAIN=http://localhost:3000
          FRONTEND_DOMAIN_HTTP=http://localhost:3000

          GMAIL_USERNAME=${{ secrets.GMAIL_USERNAME }}
          GMAIL_PASSWORD=${{ secrets.GMAIL_PASSWORD }}
          GMAIL_FROM=${{ secrets.GMAIL_FROM }}
          GMAIL_PORT=${{ secrets.GMAIL_PORT }}
          GMAIL_SERVER=${{ secrets.GMAIL_SERVER }}

          DB_PORT=5432
          DB_PASSWORD=test
          DB_USER=test
          DB_NAME=test
          DB_HOST=localhost

          STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}

          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          S3_REGION=${{ secrets.S3_REGION }}

          S3_ENDPOINT=http://localhost:9000
          S3_PUBLIC_URL=http://localhost:9000

          EOF

      - name: Start DB with docker compose
        run: |
          docker compose -f local.yml up -d asrp_database minio
          docker compose -f local.yml ps
          docker compose -f local.yml logs --no-color --tail=50 asrp_database || true

      - name: Wait for Postgres
        shell: bash
        run: |
          for i in {1..12}; do
            if docker compose -f local.yml exec -T asrp_database pg_isready -U test; then
              echo "PostgreSQL is ready"; exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/12)"
            sleep 5
          done
          echo "PostgreSQL failed to start"
          docker compose -f local.yml logs asrp_database || true
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Poetry & deps
        run: |
          python3 -m pip install --upgrade pip pipx
          pipx ensurepath
          pipx install poetry
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          poetry install --with dev
          mkdir -p media/directors_board_uploads

      - name: Ensure schema up
        run: poetry run alembic upgrade head

      - name: Run tests
        run: poetry run pytest

  deploy_dev:
    needs: [prepare, migrations, tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to dev server via SSH
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            cd ~/asrp-backend

            git fetch origin
            git checkout develop
            git pull origin develop

            docker compose -f local.yml up -d --build
