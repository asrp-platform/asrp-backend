services:
  asrp_database:
    container_name: asrp_database
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./compose/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: "pg_isready -U ${DB_USER:-test}"
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - default

  asrp_backend:
    container_name: asrp_backend
    build:
      context: .
      dockerfile: compose/backend/Dockerfile
    depends_on:
      asrp_database:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./app/:/app/app/
      - ./alembic/:/app/alembic
      - ./logs/:/app/logs
    networks:
      - default

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - 80:80
    volumes:
      - ./compose/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /var/www/asrp-frontend:/var/www/asrp-frontend:ro
    depends_on:
      - asrp_backend
    restart: unless-stopped
    networks:
      - default


volumes:
  postgres_data:


networks:
  default:
    driver: bridge
